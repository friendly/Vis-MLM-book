# Quarto "online" profile — extends _quarto.yml for the HTML build.
# Adds online-only appendices that are excluded from the PDF.
# Usage: quarto render --to html --profile online
#
# Quarto merges arrays (confirmed by cderv), so these entries APPEND to the
# base chapter list — they do not replace it. Do NOT duplicate chapters here.
# All format settings are already in _quarto.yml; no format overrides needed.

book:
  appendices:
    - 15-case-studies.qmd
    - Rcode.qmd
